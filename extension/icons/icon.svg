<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="#0C1425"/>

  <!-- Connecting lines between dots -->
  <line x1="22" y1="96" x2="64" y2="52"
        stroke="#34D399" stroke-width="7"
        stroke-linecap="round" opacity=".55"/>
  <line x1="64" y1="52" x2="106" y2="18"
        stroke="#34D399" stroke-width="7"
        stroke-linecap="round" opacity=".85"/>

  <!-- Three ascending dots -->
  <circle cx="22"  cy="96" r="10" fill="#34D399" opacity=".45"/>
  <circle cx="64"  cy="52" r="10" fill="#34D399" opacity=".72"/>
  <circle cx="106" cy="18" r="10" fill="#34D399"/>

  <!-- Subtle highlight ring on top dot -->
  <circle cx="106" cy="18" r="14" fill="none"
          stroke="#34D399" stroke-width="2" opacity=".2"/>
</svg>
